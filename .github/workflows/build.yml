name: Build & Release

on:
  # Manual only — builds/releases run when you click "Run workflow" (or ask me to).
  # No automatic build on push.
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS (Apple Silicon) — all three widgets ──────────────────────
          - { platform: macos-latest, widget: confetti-butt,  args: '--target aarch64-apple-darwin', rust-target: aarch64-apple-darwin }
          - { platform: macos-latest, widget: emoji,      args: '--target aarch64-apple-darwin', rust-target: aarch64-apple-darwin }
          - { platform: macos-latest, widget: magnifier,  args: '--target aarch64-apple-darwin', rust-target: aarch64-apple-darwin }
          - { platform: macos-latest, widget: weather,    args: '--target aarch64-apple-darwin', rust-target: aarch64-apple-darwin }
          # ── Windows — Tassels (emoji) + Weather; Lens & Confetti Butt are macOS-only ──
          - { platform: windows-latest, widget: emoji,    args: '', rust-target: '' }
          - { platform: windows-latest, widget: weather,  args: '', rust-target: '' }

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write   # tauri-action needs this to create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          # One shared workspace target at the repo root; key per widget bundle.
          key: ${{ matrix.widget }}

      - name: Install frontend deps
        working-directory: ${{ matrix.widget }}
        run: npm install

      - name: Build & upload ${{ matrix.widget }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing + notarization (unused/ignored on the Windows runner).
          # If these secrets are unset, macOS builds are simply unsigned.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: ${{ matrix.widget }}
          tagName: v__VERSION__
          releaseName: Desktop Widgets v__VERSION__
          releaseBody: |
            Transparent floating desktop widgets. Drag anywhere, press Escape to quit.
            Download the one you want from https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  deploy-page:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read   # to read the release we just published
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _site/icons
          cp .github/download-page.html _site/index.html
          cp brand/icons/*.png _site/icons/
          # Bake the latest release into the site so the page never depends on a
          # live (rate-limited / blockable) api.github.com call from the browser.
          curl -sSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" \
            -o _site/release.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deploy
        uses: actions/deploy-pages@v4
