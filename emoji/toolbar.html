<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; user-select: none; }
    #wrap { display: flex; flex-direction: column; align-items: center; padding: 8px; }
    #pill { display: flex; align-items: center; gap: 4px; max-width: 500px;
      background: rgba(12,14,26,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px; padding: 7px 10px; box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px); }
    .emoji-wrap { flex: 1 1 auto; min-width: 0; display: flex; flex-wrap: wrap;
      align-items: center; justify-content: center; gap: 1px 2px; }
    .btn { font-size: 26px; line-height: 1; background: none; border: none; cursor: pointer;
      color: #eceeffff; padding: 4px 5px; border-radius: 11px; transition: background 0.1s; }
    .btn:hover { background: rgba(255,255,255,0.12); }
    .btn.em { font-size: 18px; padding: 2px 4px; border-radius: 8px; }   /* small + wraps */
    .btn.editing { background: rgba(90,125,255,0.28); outline: 2px solid #5a7dff; }
    .btn.ico { font-size: 20px; font-weight: 600; color: #cdd3e8; }
    .btn.ico.add { font-size: 16px; }
    .btn.close { font-size: 17px; font-weight: 700; color: #ff7a7a; flex: 0 0 auto; }
    .btn.close:hover { background: rgba(255,80,80,0.25); }
    .sep { width: 1px; height: 26px; background: rgba(255,255,255,0.15); margin: 0 3px; }
    #picker { margin-top: 8px; background: rgba(12,14,26,0.96);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 12px;
      display: none; flex-direction: column; width: 496px; }
    #picker.open { display: flex; }
    .pick-input { display: flex; gap: 5px; margin-bottom: 8px; }
    .pick-input input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 9px; color: #fff; font-size: 15px; padding: 7px 10px; outline: none; }
    .pick-input input::placeholder { color: rgba(255,255,255,0.35); }
    .pick-remove { width: 100%; margin-bottom: 8px;
      background: rgba(255,90,90,0.12); border: 1px solid rgba(255,90,90,0.3); border-radius: 9px;
      color: #ff8d8d; font-size: 12px; font-weight: 600; letter-spacing: 0.4px; padding: 7px; cursor: pointer; }
    .pick-remove:hover { background: rgba(255,90,90,0.22); }
    .pick-packs { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .pack-select { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px; color: #fff; font-size: 12px; padding: 5px 8px; outline: none; cursor: pointer; }
    .pack-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px; color: #cdd3e8; font-size: 12px; padding: 5px 9px; cursor: pointer; white-space: nowrap; }
    .pack-btn:hover { background: rgba(122,162,255,0.25); border-color: #5a7dff; }
    .pack-btn.del:disabled { opacity: 0.35; cursor: default; }
    .pack-btn.del:disabled:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.16); }
    .pack-name { display: flex; gap: 6px; margin-bottom: 8px; }
    .pack-name input { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px; color: #fff; font-size: 13px; padding: 6px 9px; outline: none; }
    .pack-name button { background: #5a7dff; border: none; border-radius: 8px; color: #fff; font-size: 12px; padding: 6px 13px; cursor: pointer; }
    .pick-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px;
      max-height: 244px; overflow-y: auto; overscroll-behavior: contain; }
    .pick-grid::-webkit-scrollbar { width: 8px; }
    .pick-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 4px; }
    .pick { font-size: 22px; background: none; border: none; cursor: pointer; padding: 4px; border-radius: 8px; color: #fff; }
    .pick:hover { background: rgba(255,255,255,0.14); }

    /* settings dropdown */
    #settings { margin-top: 8px; width: 360px; max-height: 400px; overflow-y: auto;
      background: rgba(12,14,26,0.96); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 12px 14px 14px; display: none;
      color: #c8c8e0; font-size: 12px; line-height: 1.5; }
    #settings.open { display: block; }
    #settings::-webkit-scrollbar { width: 8px; }
    #settings::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.18); border-radius: 4px; }
    .s-group { font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
      opacity: 0.4; margin: 12px 0 6px; }
    .s-group:first-child { margin-top: 0; }
    .s-row { margin-bottom: 9px; }
    .s-top { display: flex; justify-content: space-between; align-items: baseline; }
    .s-top span:first-child { opacity: 0.85; }
    .s-val { font-variant-numeric: tabular-nums; opacity: 0.55; font-size: 11px; }
    .s-row input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 3px;
      background: rgba(255,255,255,0.13); outline: none; margin-top: 3px; }
    .s-row input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px;
      border-radius: 50%; background: #7aa2ff; cursor: pointer; box-shadow: 0 0 6px rgba(122,162,255,0.5); }
    .s-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .s-toggle input { width: 34px; height: 18px; -webkit-appearance: none; border-radius: 10px;
      background: rgba(255,255,255,0.16); position: relative; cursor: pointer; transition: background 0.15s; }
    .s-toggle input:checked { background: #5a7dff; }
    .s-toggle input::before { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px;
      border-radius:50%; background:#fff; transition: transform 0.15s; }
    .s-toggle input:checked::before { transform: translateX(16px); }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="pill"></div>
    <div id="picker"></div>
    <div id="settings"></div>
  </div>
  <script type="module" src="/src/toolbar.js"></script>
</body>
</html>
