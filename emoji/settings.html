<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow-y: auto; overflow-x: hidden;
      background: #0b0d1a; color: #c8c8e0;
      font: 12px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      user-select: none;
    }
    #app { padding: 12px 14px 16px; }
    .hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .hdr h1 { font-size: 12px; font-weight: 700; letter-spacing: 0.6px; opacity: 0.85; }
    .hdr button {
      font: inherit; font-size: 10px; color:#aab; background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; padding: 3px 8px; cursor: pointer;
    }
    .hdr button:hover { background: rgba(255,255,255,0.13); }
    .group { font-size: 9px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
             opacity: 0.4; margin: 14px 0 6px; }
    .row { display: grid; grid-template-columns: 1fr; gap: 2px; margin-bottom: 9px; }
    .rl { display: flex; justify-content: space-between; align-items: baseline; }
    .rl .lab { opacity: 0.85; }
    .rl .val { font-variant-numeric: tabular-nums; opacity: 0.55; font-size: 11px; }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 4px; border-radius: 3px;
      background: rgba(255,255,255,0.13); outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: #7aa2ff; cursor: pointer; box-shadow: 0 0 6px rgba(122,162,255,0.5);
    }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
    .toggle-row input { width: 34px; height: 18px; -webkit-appearance: none; border-radius: 10px;
      background: rgba(255,255,255,0.16); position: relative; cursor: pointer; transition: background 0.15s; }
    .toggle-row input:checked { background: #5a7dff; }
    .toggle-row input::before { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px;
      border-radius:50%; background:#fff; transition: transform 0.15s; }
    .toggle-row input:checked::before { transform: translateX(16px); }
    .emoji-active { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; min-height:30px; }
    .echip { font-size:20px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12);
      border-radius:8px; padding:2px 5px; cursor:pointer; }
    .echip:hover { background:rgba(255,80,80,0.22); }
    .emoji-pal { display:grid; grid-template-columns:repeat(8,1fr); gap:3px; margin-bottom:4px; }
    .epal { font-size:19px; background:none; border:1px solid transparent; border-radius:7px; padding:3px; cursor:pointer; }
    .epal:hover { background:rgba(255,255,255,0.12); }
    .epal.on { border-color:#5a7dff; background:rgba(90,125,255,0.18); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/settings-ui.js"></script>
</body>
</html>
