<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; user-select: none; }
    #wrap { display: flex; justify-content: center; padding: 8px; }
    #pill { display: flex; align-items: center; gap: 4px;
      background: rgba(12,14,26,0.92); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px; padding: 7px 9px; box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      backdrop-filter: blur(10px); }

    /* leading grip / quit-manager button */
    .ctl { font-size: 15px; line-height: 1; background: none; border: none; cursor: pointer;
      color: #cdd3e8; padding: 5px 7px; border-radius: 11px; transition: background 0.1s; }
    .ctl:hover { background: rgba(255,255,255,0.12); }
    .ctl.close { color: #ff7a7a; font-weight: 700; }
    .ctl.close:hover { background: rgba(255,80,80,0.25); }
    .sep { width: 1px; height: 26px; background: rgba(255,255,255,0.15); margin: 0 3px; flex: 0 0 auto; }

    /* one chip per widget */
    .chip { display: flex; align-items: center; gap: 6px; cursor: pointer;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
      border-radius: 13px; padding: 5px 10px 5px 8px; transition: background 0.12s, border-color 0.12s; }
    .chip:hover { background: rgba(255,255,255,0.12); }
    .chip.on { background: rgba(90,125,255,0.18); border-color: rgba(122,162,255,0.55); }
    .chip .glyph { font-size: 18px; line-height: 1; }
    .chip .name { font-size: 12px; font-weight: 600; color: #d7dcf0; white-space: nowrap; }
    .chip.off .name { color: #8b90a8; }
    .chip .dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto;
      background: rgba(255,255,255,0.22); box-shadow: none; }
    .chip.on .dot { background: #5ee08a; box-shadow: 0 0 6px rgba(94,224,138,0.8); }

    .empty { font-size: 11px; color: #8b90a8; padding: 4px 8px; max-width: 280px; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="wrap">
    <div id="pill"></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
